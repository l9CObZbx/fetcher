openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
paths:
  /tenant/{tenantId}/users:
    get:
      operationId: user_service.users.snapshot_state.single
      tags:
        - user_service.users
      summary: List users in tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserState'
    post:
      operationId: user_service.users.create_user
      tags:
        - user_service.users
      summary: Create user
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserCommand'
      responses:
        '201':
          description: User created
  /tenant/{tenantId}/users/{userId}:
    get:
      operationId: getUser
      tags:
        - users
      summary: Get user by ID
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserState'
    put:
      operationId: user_service.users.update_user
      tags:
        - user_service.users
      summary: Update user
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserCommand'
      responses:
        '200':
          description: User updated
    delete:
      operationId: user_service.users.default_delete_aggregate
      tags:
        - user_service.users
      summary: Delete user
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
components:
  schemas:
    UserState:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        email:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - suspended
    CreateUserCommand:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
        name:
          type: string
    UpdateUserCommand:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        status:
          type: string
